function multiSimple(icon,en,arr){return {icon,en,leadJa:'複数のバスで行ける場合があります。乗り場を確認してください。',leadEn:'Several buses may be available. Please check the boarding points.',routes:arr.map(a=>({companyJa:a[0],companyEn:a[1],stop:a[2],noteJa:'車体表示と行き先を確認してください。',noteEn:'Check the bus display and destination.'}))}}
let lang='ja', current='神戸空港';
function t(ja,en){return lang==='ja'?ja:en}
function scrollToDetail(){
  const el=document.getElementById('detail');
  if(!el) return;
  setTimeout(()=>{ el.scrollIntoView({behavior:'smooth', block:'start'}); },80);
}
function renderDest(){const el=document.getElementById('destinations');el.innerHTML='';groups.forEach(g=>{const h=document.createElement('div');h.className='kana';h.textContent=g.kana;el.appendChild(h);g.items.forEach(name=>{const b=document.createElement('button');b.className='dest-btn'+(name===current?' selected':'');b.textContent=lang==='ja'?name:(data[name]?.en||name);b.onclick=()=>{current=name;render();scrollToDetail()};el.appendChild(b)})});const note=document.createElement('div');note.className='small-note';note.textContent=t('※バスの運行状況は変更される場合があります。ご利用の際は最新情報をご確認ください。','Bus services may change. Please check the latest information before use.');el.appendChild(note)}
function renderDetail(){const d=data[current]; const el=document.getElementById('detail'); if(!d){el.innerHTML='<div class="empty">データ準備中です。</div>';return} const cards=d.routes.map((r,i)=>routeCard(r,i)).join(''); el.innerHTML=`<div class="selected-banner">${t('選択中：','Now showing: ')}${t(current,d.en)}</div><h2>${d.icon||'🚌'} ${t(current,d.en)}</h2><p class="lead">${t(d.leadJa,d.leadEn)}</p>${cards}${d.transferGood?transferBox():''}${d.loopHelp?loopHelp():''}${d.noticeJa?`<div class="warning danger"><strong>${t('⚠ 乗り間違い注意','⚠ Avoid boarding the wrong bus')}</strong>${t(d.noticeJa,d.noticeEn)}</div>`:''}<div class="notice"><h3>ℹ️ ${t('ご案内','Information')}</h3><ul><li>${t('写真と現地の表示を見比べてください。','Compare the photos with the signs at the station.')}</li><li>${t('道路状況により遅延することがあります。','Buses may be delayed due to traffic.')}</li><li>${t('公式リンクはあとで追加予定です。','Official links can be added later.')}</li></ul>${d.guideJa?`<p>${t(d.guideJa,d.guideEn)}</p>`:''}</div><div class="actions"><button class="action-btn">${t('公式時刻表リンクを追加予定','Official timetable link to be added')}</button></div><button class="back" onclick="window.scrollTo({top:0,behavior:'smooth'})">← ${t('行き先一覧に戻る','Back to destination list')}</button><div id="guideArea" class="guide"></div>`}
function routeCard(r,i){const s=stopInfo[r.stop]; let photos=r.photos || stopPhotos[r.stop]||[];
  if(r.stop==='west' && !r.photos){
    if((r.companyJa||'').includes('シティーループ') || (r.companyEn||'').includes('City Loop')){
      photos=[{src:ASSETS.westCL, ja:'シティーループ（City Loop）停車中', en:'City Loop bus'}];
    }else if((r.companyJa||'').includes('ポートループ') || (r.companyEn||'').includes('Port Loop')){
      photos=[{src:ASSETS.westPL, ja:'ポートループ（Port Loop）停車中', en:'Port Loop bus'}];
    }
  } const photoHtml=photos.slice(0,3).map(p=>`<figure class="photo"><img src="${p.src}" alt="${t(p.ja,p.en)}"><figcaption>${t(p.ja,p.en)}</figcaption></figure>`).join(''); const guideBtn=(r.stop==='tunnel'||r.stop==='hotel')?`<button class="action-btn ${r.stop==='hotel'?'pink':''}" onclick="showGuide('${r.stop}')">${t(s.ja+'への行き方を見る','How to get to '+s.en)}</button>`:''; const warn=r.warnJa?`<div class="warning ${r.danger?'danger':''}"><strong>${t(r.warnTitleJa||'⚠ 間違えやすいです',r.warnTitleEn||'⚠ Easy to mix up')}</strong>${t(r.warnJa,r.warnEn)}</div>`:''; const avoid=r.avoidJa?`<div class="warning danger"><strong>${t(r.avoidTitleJa||'乗らないでください',r.avoidTitleEn||'Do not take this bus')}</strong>${t(r.avoidJa,r.avoidEn)}</div>`:''; return `<section class="route-card"><div class="route-title">${r.icon|| (r.stop==='middle'?'🚌':r.stop==='hotel'?'🧳':'🚌')} ${t(r.companyJa,r.companyEn)}</div><div class="stop">${t('乗り場：','Boarding point: ')} <span class="place ${s.cls}">${t(s.ja,s.en)}</span></div>${warn}${avoid}<div class="photos">${photoHtml}</div><div class="point ${s.cls}"><strong>${t('ポイント','Point')}</strong>${t(r.pointJa||s.pointJa,r.pointEn||s.pointEn)}<br>${t(r.noteJa,r.noteEn)}</div><div class="actions">${guideBtn}</div></section>`}

function transferBox(){
  return `<div class="transfer-box"><strong>${t('◎乗換がしやすい停留所','Convenient transfer stop')}</strong>${t('この停留所は、シティーループ（City Loop）とポートループ（Port Loop）の乗換がしやすい場所です。','This stop is a convenient place to transfer between City Loop and Port Loop.')}</div>`
}

function loopHelp(){
  const cityStopsJa=['かもめりあ','ハーバーランド（モザイク前）','西元町','みなと元町駅前','南京町方面','旧居留地（市立博物館）','京町筋','三宮センター街東口','地下鉄三宮駅前','北野坂','北野異人館','神戸布引ハーブ園／ロープウェイ','新神戸駅前','市役所前','南京町（元町商店街）','メリケンパーク','ポートタワー前'];
  const cityStopsEn=['Kamomeria','Harborland / Mosaic','Nishi-Motomachi','Minato Motomachi','Nankinmachi area','Former Foreign Settlement / Kobe City Museum','Kyomachi-suji','Sannomiya Center Gai East','Subway Sannomiya Sta.','Kitanozaka','Kitano Ijinkan','Kobe Nunobiki Herb Gardens / Ropeway','Shin-Kobe Sta.','City Hall','Nankinmachi / Motomachi Shopping Street','Meriken Park','Port Tower'];
  const portStopsJa=['新神戸駅前1F','三宮前','市役所・東遊園地前','KIITO前（三宮図書館）','アリーナ前','新港町','ポートタワー前','神戸駅南口','ハーバーランド（モザイク前）','メリケンパーク','かもめりあ（神戸港観光船のりば・ポートタワー西）'];
  const portStopsEn=['Shin-Kobe Sta. 1F','Sannomiya-mae','City Hall / Higashi Yuenchi','KIITO-mae / Sannomiya Library','Arena-mae','Shinkocho','Port Tower','Kobe Station South Exit','Harborland / Mosaic','Meriken Park','Kamomeria / Kobe sightseeing boat pier / west of Port Tower'];
  const transferWordsJa=['ポートタワー前','メリケンパーク','かもめりあ'];
  const transferWordsEn=['Port Tower','Meriken Park','Kamomeria'];
  const isTransfer=(ja,en)=>transferWordsJa.some(w=>ja.includes(w)) || transferWordsEn.some(w=>en.includes(w));
  const list=(ja,en)=>ja.map((x,i)=>`<li class="${isTransfer(x,en[i])?'transfer-stop':''}">${t(x,en[i])}${isTransfer(x,en[i])?` <span>${t('（乗換がしやすい停留所）','(easier transfer stop)')}</span>`:''}</li>`).join('');
  return `<div class="loop-help"><h3>${t('シティーループ（City Loop）とポートループ（Port Loop）の違い','City Loop vs Port Loop')}</h3><p>${t('同じロータリー西端付近でも、シティーループ（City Loop）とポートループ（Port Loop）は停車するバス停・行き先が違います。車体表示も確認してください。公式図の画像は使わず、停留所名を案内用に整理しています。','Even around the same west-end rotary area, City Loop and Port Loop use different stops and destinations. This app does not show the official route-map image; it lists stop names in a simplified guide.')}</p><div class="ticket-box"><strong>${t('1日・2日乗車券について','About 1-day / 2-day tickets')}</strong>${t('City Loop と Port Loop の両方で利用できる乗車券があります。購入・利用時は券面と最新案内を確認してください。','Some 1-day / 2-day tickets can be used on both City Loop and Port Loop. Please check the ticket and the latest information when buying or using it.')}</div><div class="transfer-legend">${t('黄色表示：City Loop と Port Loop の乗換がしやすい停留所','Yellow highlight: stops where シティーループ（City Loop）／ポートループ（Port Loop） transfers are easier')}</div><div class="loop-lists"><div class="loop-list"><h4>🟩 ${t('シティーループ 主な停留所','Main City Loop stops')}</h4><ul>${list(cityStopsJa,cityStopsEn)}</ul></div><div class="loop-list"><h4>🟦 ${t('ポートループ 主な停留所','Main Port Loop stops')}</h4><ul>${list(portStopsJa,portStopsEn)}</ul></div></div><div class="warning danger"><strong>${t('⚠ 乗り間違い注意','⚠ Avoid boarding the wrong bus')}</strong>${t('アリーナ前へ行く人はポートループ（車体表示：Port Loop）。南京町へ行く人はシティーループ（車体表示：City Loop）です。バス停表示と車体表示を必ず確認してください。','For Arena-mae, take Port Loop. For Nankinmachi, take City Loop. Always check both the bus-stop sign and the bus display.')}</div><p class="loop-note">${t('※停留所名は案内用の簡略表示です。運行状況・停車順は変更される場合があります。黄色表示の停留所でも、同じバス停に停まるとは限りません。','Stop names are simplified for guidance. Operations and stop order may change. Even at yellow-highlighted stops, the two buses may not stop at exactly the same bus stop.')}</p></div>`}


function showGuide(type){const el=document.getElementById('guideArea'); if(type==='tunnel'){el.innerHTML=`<h3>🚶 ${t('トンネル入口バス停への行き方','How to get to the Tunnel Entrance bus stop')}</h3>
<p>${t('有馬温泉・三田プレミアムアウトレット・三木・小野方面などの神姫バスは、1階ロータリーではなく「トンネル入口バス停」から乗車します。','For Arima Onsen, Sanda Premium Outlets, Miki, Ono and other Shinki Bus destinations, board at the Tunnel Entrance bus stop, not the 1F rotary.')}</p>

<figure class="guide-step"><img src="${ASSETS.tunnelStep1}" alt="Tunnel step 1"><figcaption>${t('① 2階へ上がり、外へ出ます。','① Go up to the 2nd floor and go outside.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.tunnelStep2}" alt="Tunnel step 2"><figcaption>${t('② ホテルへの渡り廊下へ進みます。','② Go to the walkway to the hotel.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.tunnelStep3}" alt="Tunnel step 3"><figcaption>${t('③ 渡り廊下を進みながら、左側を確認します。','③ Walk along the walkway and check the left side.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.tunnelStep4}" alt="Tunnel step 4"><figcaption>${t('④ 左側の白い階段を下ります。','④ Go down the white stairs on your left.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.tunnelMainStop}" alt="Tunnel step 5"><figcaption>${t('⑤ 階段を下りると、新神戸駅（トンネル入口）バスのりばに到着します。','⑤ After going down the stairs, you arrive at the Shin-Kobe Station Tunnel Entrance bus stop.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.tunnelOverview}" alt="Tunnel overview"><figcaption>${t('補足：JR新神戸駅とトンネル入口バス停の位置関係です。','Extra: This shows the positional relationship between JR Shin-Kobe Station and the Tunnel Entrance bus stop.')}</figcaption></figure>

<div class="point"><strong>${t('ポイント','Point')}</strong>${t('ここは1階ロータリー内ではありません。バス停表示で目的地を確認してください。','This is not inside the 1F rotary. Check the destination on the bus-stop sign.')}</div>
<p><span class="tag">有馬温泉</span><span class="tag">三田プレミアムアウトレット</span><span class="tag">三木</span><span class="tag">小野</span><span class="tag">64系統</span></p>`}
else{el.innerHTML=`<h3>🧳 ${t('ホテル玄関前（4階）への行き方','How to get to the hotel entrance / 4F')}</h3>
<p>${t('徳島バス・阪神バス・神姫バスの徳島方面、関空リムジンはホテル玄関前（4階）へ向かいます。1階ロータリーではありません。','Tokushima/Hanshin/Shinki buses for Tokushima and the Kansai Airport Limousine board at the hotel entrance / 4F. This is not the 1F rotary.')}</p>

<figure class="guide-step"><img src="${ASSETS.hotelStep1}" alt="Step 1"><figcaption>${t('① 2階へ上がり、外へ出ます。','① Go up to the 2nd floor and go outside.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.hotelStep2}" alt="Step 2"><figcaption>${t('② ホテルへの渡り廊下へ進みます。','② Go to the walkway to the hotel.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.hotelStep3}" alt="Step 3"><figcaption>${t('③ 渡り廊下をまっすぐ進みます。','③ Walk straight along the walkway.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.hotelStep4}" alt="Step 4"><figcaption>${t('④ 渡り廊下を渡り切り、ホテル側に入ります。','④ Cross the walkway and enter the hotel side.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.hotelStep5}" alt="Step 5"><figcaption>${t('⑤ ANA CROWNE PLAZA KOBE の表示が見えたら、4階ホテル側に到着です。','⑤ When you see “ANA CROWNE PLAZA KOBE,” you have arrived on the hotel side, 4th floor.')}</figcaption></figure>
<figure class="guide-step"><img src="${ASSETS.hotelStep6}" alt="Step 6"><figcaption>${t('⑥ ホテル玄関前へ進みます。','⑥ Proceed to the hotel entrance area.')}</figcaption></figure>

<div class="point pink"><strong>${t('ポイント','Point')}</strong>${t('ホテル玄関前（4階）のりばは、1階ロータリーではありません。現地では「徳島方面」「関西空港方面」の表示を確認してください。','The hotel entrance / 4F bus stop is not the 1F rotary. At the site, check the signs for “Tokushima” or “Kansai Airport”.')}</div>
<p><span class="tag">徳島</span><span class="tag">関空リムジン</span></p>`} el.classList.add('show'); el.scrollIntoView({behavior:'smooth',block:'start'});}
function renderStaticText(){document.querySelectorAll('[data-ja]').forEach(e=>{e.textContent=t(e.dataset.ja,e.dataset.en)});document.getElementById('jaBtn').classList.toggle('active',lang==='ja');document.getElementById('enBtn').classList.toggle('active',lang==='en')}
function render(){renderStaticText();renderDest();renderDetail()}
document.getElementById('jaBtn').onclick=()=>{lang='ja';render()};document.getElementById('enBtn').onclick=()=>{lang='en';render()};render();
</script>
